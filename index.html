<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>やることポケット</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1565c0;
      --blue-dark: #0d47a1;
      --yellow: #fbc02d;
      --yellow-soft: #fff9c4;
      --red: #d32f2f;
    }
    body {
      font-family: -apple-system, "Hiragino Sans", sans-serif;
      background: #eef2f7;
      color: #2c3e50;
      max-width: 500px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px 18px 88px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      color: var(--blue);
      letter-spacing: 0.5px;
    }
    .add-btn {
      background: var(--blue);
      color: #fff;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
      box-shadow: 0 3px 8px rgba(21,101,192,0.35);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .add-btn:hover { transform: translateY(-2px); }
    .add-btn:active { transform: scale(0.94); }
    .hint {
      background: var(--yellow-soft);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 18px;
      color: #6d4c00;
      border-left: 4px solid var(--yellow);
    }
    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn 0.25s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .screen-title {
      font-size: 19px;
      color: var(--blue);
      margin-bottom: 12px;
      font-weight: 700;
    }
    .link-btn {
      display: inline-block;
      background: var(--yellow);
      color: #5d4200;
      text-decoration: none;
      padding: 11px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
      box-shadow: 0 2px 6px rgba(251,192,45,0.4);
      transition: transform 0.12s;
    }
    .link-btn:active { transform: scale(0.96); }
    .task-list { list-style: none; }
    .task-item {
      background: #fff;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 11px;
      display: flex;
      align-items: center;
      gap: 11px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      flex-wrap: wrap;
      transition: opacity 0.5s, transform 0.12s;
    }
    .task-item.fading { opacity: 0; transform: translateX(20px); }
    .task-item input[type="checkbox"] {
      width: 22px;
      height: 22px;
      cursor: pointer;
      flex-shrink: 0;
      accent-color: var(--blue);
    }
    .task-text { flex: 1; word-break: break-all; min-width: 120px; font-size: 15px; }
    .done-msg {
      flex: 1;
      color: var(--red);
      font-weight: 700;
      min-width: 120px;
    }
    .icon-group {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .icon-btn {
      background: #f1f4f8;
      border: 2px solid transparent;
      border-radius: 10px;
      width: 38px;
      height: 38px;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      transition: all 0.15s;
    }
    .icon-btn:active { transform: scale(0.9); }
    .icon-btn.selected {
      background: var(--blue);
      border-color: var(--blue-dark);
      box-shadow: 0 2px 6px rgba(21,101,192,0.4);
    }
    .empty-msg {
      color: #9aa5b1;
      font-size: 14px;
      padding: 28px 0;
      text-align: center;
    }
    .due-label {
      font-size: 12px;
      color: var(--blue);
      background: #e3f0fd;
      padding: 4px 9px;
      border-radius: 8px;
      font-weight: 600;
    }
    .due-input {
      font-size: 13px;
      padding: 6px 9px;
      border: 1px solid #cfd8e3;
      border-radius: 8px;
      color: var(--blue);
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 500px;
      background: #fff;
      display: flex;
      border-top: 1px solid #e3e8ee;
      box-shadow: 0 -3px 10px rgba(0,0,0,0.06);
    }
    .nav-btn {
      flex: 1;
      border: none;
      background: none;
      padding: 9px 2px;
      font-size: 11px;
      color: #9aa5b1;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      transition: color 0.15s;
    }
    .nav-btn .nav-icon { font-size: 21px; }
    .nav-btn.active { color: var(--blue); font-weight: 700; }
  </style>
</head>
<body>
  <header>
    <h1>やることポケット</h1>
    <button class="add-btn" onclick="addTask()">＋</button>
  </header>
  <section class="screen active" data-screen="list">
    <p class="hint">⚾ ボールが来たらすぐに登録する</p>
    <ul class="task-list" id="list-list"></ul>
  </section>
  <section class="screen" data-screen="pin">
    <h2 class="screen-title">📌 軽めのタスク</h2>
    <p class="hint">いつもこの中は空にすること</p>
    <ul class="task-list" id="list-pin"></ul>
  </section>
  <section class="screen" data-screen="check">
    <h2 class="screen-title">☑️ 重めのタスク</h2>
    <p class="hint">小さく分解させる</p>
    <a class="link-btn" href="https://www.mindmeister.com/login" target="_blank">🧠 マインドマイスターで分解する</a>
    <ul class="task-list" id="list-check"></ul>
  </section>
  <section class="screen" data-screen="cal">
    <h2 class="screen-title">🗓️ スケジュール</h2>
    <p class="hint">予定はGoogleカレンダーで管理しよう</p>
    <a class="link-btn" href="https://calendar.google.com" target="_blank">📅 Googleカレンダーを開く</a>
    <ul class="task-list" id="list-cal"></ul>
  </section>
  <section class="screen" data-screen="idea">
    <h2 class="screen-title">💡 アイデア</h2>
    <p class="hint">アクションプランまで落とし込もう。AIも活用しよう</p>
    <a class="link-btn" href="https://www.mindmeister.com/login" target="_blank">🧠 マインドマイスターで整理する</a>
    <ul class="task-list" id="list-idea"></ul>
  </section>
  <nav class="bottom-nav">
    <button class="nav-btn active" data-target="list" onclick="switchScreen('list')"><span class="nav-icon">📋</span>リスト</button>
    <button class="nav-btn" data-target="pin" onclick="switchScreen('pin')"><span class="nav-icon">📌</span>軽め</button>
    <button class="nav-btn" data-target="check" onclick="switchScreen('check')"><span class="nav-icon">☑️</span>重め</button>
    <button class="nav-btn" data-target="cal" onclick="switchScreen('cal')"><span class="nav-icon">🗓️</span>予定</button>
    <button class="nav-btn" data-target="idea" onclick="switchScreen('idea')"><span class="nav-icon">💡</span>アイデア</button>
  </nav>
  <script>
    const ICON_TO_SCREEN = { '📌': 'pin', '☑️': 'check', '🗓️': 'cal', '💡': 'idea' };
    const ICONS = ['📌', '☑️', '🗓️', '💡'];
    const STORAGE_KEY = 'yarukoto-pocket-tasks';
    let tasks = [];
    let nextId = 1;
    function save() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks, nextId }));
      } catch (e) {
        console.log('保存できませんでした:', e);
      }
    }
    function load() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) {
          const parsed = JSON.parse(data);
          tasks = parsed.tasks || [];
          nextId = parsed.nextId || 1;
        }
      } catch (e) {
        console.log('読み込めませんでした:', e);
      }
    }
    function addTask() {
      const text = prompt('タスクの内容を入力してください');
      if (!text || text.trim() === '') return;
      tasks.push({ id: nextId++, text: text.trim(), icon: null, done: false, due: null });
      save();
      render();
    }
    function switchScreen(target) {
      document.querySelectorAll('.screen').forEach(s => {
        s.classList.toggle('active', s.dataset.screen === target);
      });
      document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.target === target);
      });
    }
    function formatDue(dateStr) {
      const d = new Date(dateStr);
      return (d.getMonth() + 1) + '月' + d.getDate() + '日';
    }
    function completeTask(task) {
      task.done = true;
      save();
      render();
      setTimeout(() => {
        document.querySelectorAll('.task-item').forEach(el => {
          if (el.dataset.taskId == task.id) el.classList.add('fading');
        });
        setTimeout(() => {
          tasks = tasks.filter(t => t.id !== task.id);
          save();
          render();
        }, 500);
      }, 3000);
    }
    function render() {
      ['list', 'pin', 'check', 'cal', 'idea'].forEach(key => {
        document.getElementById('list-' + key).innerHTML = '';
      });
      tasks.forEach(task => {
        document.getElementById('list-list').appendChild(makeTaskEl(task, 'list'));
        if (task.icon) {
          const screenKey = ICON_TO_SCREEN[task.icon];
          document.getElementById('list-' + screenKey).appendChild(makeTaskEl(task, screenKey));
        }
      });
      ['pin', 'check', 'cal', 'idea'].forEach(key => {
        const ul = document.getElementById('list-' + key);
        if (ul.children.length === 0) {
          const p = document.createElement('li');
          p.className = 'empty-msg';
          p.textContent = 'まだタスクがありません';
          ul.appendChild(p);
        }
      });
    }
    function makeTaskEl(task, screenKey) {
      const li = document.createElement('li');
      li.className = 'task-item' + (task.done ? ' done' : '');
      li.dataset.taskId = task.id;
      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = task.done;
      checkbox.disabled = task.done;
      checkbox.onchange = () => {
        if (checkbox.checked) completeTask(task);
      };
      const span = document.createElement('span');
      if (task.done) {
        span.className = 'done-msg';
        span.textContent = '楽勝🖊️タスクを完了しました';
      } else {
        span.className = 'task-text';
        span.textContent = task.text;
      }
      li.appendChild(checkbox);
      li.appendChild(span);
      if (task.due && !task.done) {
        const due = document.createElement('span');
        due.className = 'due-label';
        due.textContent = '期限：' + formatDue(task.due);
        li.appendChild(due);
      }
      if (screenKey === 'list' && !task.done) {
        const iconGroup = document.createElement('div');
        iconGroup.className = 'icon-group';
        ICONS.forEach(icon => {
          const btn = document.createElement('button');
          btn.className = 'icon-btn' + (task.icon === icon ? ' selected' : '');
          btn.textContent = icon;
          btn.onclick = () => {
            task.icon = (task.icon === icon) ? null : icon;
            save();
            render();
          };
          iconGroup.appendChild(btn);
        });
        li.appendChild(iconGroup);
      }
      if (screenKey === 'check' && !task.done) {
        const dateInput = document.createElement('input');
        dateInput.type = 'date';
        dateInput.className = 'due-input';
        if (task.due) dateInput.value = task.due;
        dateInput.onchange = () => {
          task.due = dateInput.value || null;
          save();
          render();
        };
        li.appendChild(dateInput);
      }
      return li;
    }
    load();
    render();
  </script>
</body>
</html>
